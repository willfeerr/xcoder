name: Build committed distribution

on:
  push:
    branches:
      - release/install-without-build
    paths:
      - src/**
      - package.json
      - tsconfig.json
      - pnpm-lock.yaml
      - .github/workflows/build-dist.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Commit distribution
        shell: bash
        run: |
          git add -f dist

          if git diff --cached --quiet; then
            echo "Distribution is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "build: update committed distribution [skip ci]"
          git push
